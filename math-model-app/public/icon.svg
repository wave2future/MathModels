<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6" />
      <stop offset="1" stop-color="#2563eb" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)" />
  <!-- coordinate axes -->
  <g stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.85">
    <line x1="96" y1="416" x2="416" y2="416" />
    <line x1="96" y1="416" x2="96" y2="96" />
  </g>
  <!-- a parabola-ish curve -->
  <path
    d="M112 384 Q 256 80 400 384"
    fill="none"
    stroke="#fde047"
    stroke-width="22"
    stroke-linecap="round"
  />
  <!-- a small cube hint -->
  <g fill="none" stroke="#ffffff" stroke-width="12" stroke-linejoin="round" opacity="0.9">
    <path d="M300 300 l60 -30 l60 30 l-60 30 z" />
    <path d="M300 300 l0 60 l60 30 l0 -60" />
    <path d="M420 300 l0 60 l-60 30" />
